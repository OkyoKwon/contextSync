services:
  postgres:
    image: postgres:16-alpine
    ports:
      - '${DB_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contextsync}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # Auto-generate self-signed SSL certs for team-host mode.
  # To use your own CA-signed certs, place them in docker/ssl/ before starting.
  ssl-init:
    image: alpine/openssl
    profiles: ['team-host']
    volumes:
      - ./docker/ssl:/ssl
    entrypoint: /bin/sh
    command: >
      -c "
      if [ -f /ssl/server.crt ] && [ -f /ssl/server.key ]; then
        echo 'SSL certs already exist — skipping.';
      else
        openssl req -new -x509 -days 365 -nodes
        -subj '/CN=contextsync-postgres'
        -keyout /ssl/server.key -out /ssl/server.crt 2>/dev/null &&
        chmod 600 /ssl/server.key && chmod 644 /ssl/server.crt &&
        echo 'SSL certs generated.';
      fi
      "

  postgres-team:
    image: postgres:16-alpine
    profiles: ['team-host']
    depends_on:
      ssl-init:
        condition: service_completed_successfully
    ports:
      - '${DB_EXTERNAL_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-contextsync}
    volumes:
      - pgdata-team:/var/lib/postgresql/data
      - ./docker/ssl:/var/lib/postgresql/ssl:ro
      - ./docker/initdb.d:/docker-entrypoint-initdb.d:ro
    command: >
      postgres
        -c ssl=on
        -c ssl_cert_file=/var/lib/postgresql/ssl/server.crt
        -c ssl_key_file=/var/lib/postgresql/ssl/server.key
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

  # When using DATABASE_PROVIDER=supabase, the postgres-team service is not needed.
  # Set your Supabase connection string in DATABASE_URL and start without --profile team-host.

volumes:
  pgdata:
  pgdata-team:
